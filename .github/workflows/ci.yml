name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    env:
      CI_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CI_LIVE_LLM_BASE_URL: ${{ secrets.LIVE_LLM_BASE_URL }}
      CI_LIVE_LLM_MODEL: ${{ secrets.LIVE_LLM_MODEL }}
      CI_LIVE_LLM_PROVIDER: ${{ secrets.LIVE_LLM_PROVIDER }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
      - name: Cargo fmt
        run: cargo fmt --all -- --check
      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Cargo test
        run: cargo test --workspace --all-targets
      - name: Cargo check (wasm32-wasip2)
        run: cargo check --target wasm32-wasip2
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main
        with:
          version: "1.17.8"
      - name: Install greentic-integration-tester
        run: cargo binstall --no-confirm greentic-integration-tester
      - name: Run static gtests
        run: |
          mkdir -p artifacts/readme-gtests artifacts/negative-gtests
          greentic-integration-tester run --gtest tests/gtests/README --artifacts-dir artifacts/readme-gtests --errors
          greentic-integration-tester run --gtest tests/gtests/negative/smoke --artifacts-dir artifacts/negative-gtests --errors
      - name: Prepare live-provider secrets
        run: |
          : "${CI_LIVE_LLM_PROVIDER:=openai}"
          : "${CI_LIVE_LLM_BASE_URL:=https://api.openai.com/v1}"
          : "${CI_LIVE_LLM_MODEL:=gpt-5-mini}"
          cat > .secrets <<EOF
          LIVE_LLM_PROVIDER=${CI_LIVE_LLM_PROVIDER}
          LIVE_LLM_BASE_URL=${CI_LIVE_LLM_BASE_URL}
          LIVE_LLM_MODEL=${CI_LIVE_LLM_MODEL}
          LIVE_LLM_API_KEY=${CI_OPENAI_API_KEY}
          LIVE_LLM_PROMPT="Respond with exactly the text PONG_TEST_42 and nothing else."
          LIVE_LLM_EXPECT_CONTAINS=PONG_TEST_42
          EOF
      - name: Run live-provider gtest
        if: ${{ env.CI_OPENAI_API_KEY != '' }}
        run: |
          mkdir -p artifacts/live-gtests
          greentic-integration-tester run --gtest tests/gtests/live --artifacts-dir artifacts/live-gtests --errors
