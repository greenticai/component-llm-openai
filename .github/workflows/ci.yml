name: CI
on:
  workflow_call:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: greenticai/.github/.github/workflows/wasm-component-ci.yml@main

  gtests:
    needs: [ci]
    runs-on: ubuntu-latest
    env:
      CI_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
      - name: Restore cargo binaries cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-bins-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bins-
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main
        with:
          version: "1.17.8"
      - name: Install Greentic CLIs
        run: |
          cargo binstall -y cargo-component greentic-dev greentic-flow greentic-pack greentic-integration-tester
          cargo binstall -y greentic-component --force
      - name: Save cargo binaries cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-bins-${{ hashFiles('**/Cargo.lock') }}
      - name: Run static gtests
        run: |
          mkdir -p artifacts/readme-gtests artifacts/negative-gtests
          greentic-integration-tester run --gtest tests/gtests/README --artifacts-dir artifacts/readme-gtests --errors
          greentic-integration-tester run --gtest tests/gtests/negative/smoke --artifacts-dir artifacts/negative-gtests --errors
      - name: Upload gtest artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: gtest-artifacts
          path: |
            artifacts/readme-gtests
            artifacts/negative-gtests
          if-no-files-found: ignore

