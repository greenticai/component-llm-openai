name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

permissions:
  contents: read
  packages: write

env:
  CI_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: |
            . -> target
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main
        with:
          version: "1.17.8"

  fmt:
    needs: bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: |
            . -> target
      - name: Cargo fmt
        run: cargo fmt --all -- --check

  clippy:
    needs: bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: |
            . -> target
      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    needs: bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: |
            . -> target
      - name: Cargo test
        run: cargo test --workspace --all-targets
      - name: Cargo check (wasm32-wasip2)
        run: cargo check --target wasm32-wasip2

  gtests:
    needs: [fmt, clippy, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: |
            . -> target
      - name: Restore cargo binaries cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-bins-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bins-
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main
        with:
          version: "1.17.8"
      - name: Install Greentic CLIs
        run: |
          cargo binstall -y cargo-component greentic-dev greentic-flow greentic-pack greentic-integration-tester
          cargo binstall -y greentic-component --force
      - name: Save cargo binaries cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-bins-${{ hashFiles('**/Cargo.lock') }}
      - name: Run static gtests
        run: |
          mkdir -p artifacts/readme-gtests artifacts/negative-gtests
          greentic-integration-tester run --gtest tests/gtests/README --artifacts-dir artifacts/readme-gtests --errors
          greentic-integration-tester run --gtest tests/gtests/negative/smoke --artifacts-dir artifacts/negative-gtests --errors
      - name: Upload gtest artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: gtest-artifacts
          path: |
            artifacts/readme-gtests
            artifacts/negative-gtests
          if-no-files-found: ignore

  publish:
    needs: gtests
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: |
            . -> target
      - name: Build WASM (release)
        run: cargo build --target wasm32-wasip2 --release
      - name: Prepare publish artifacts
        run: |
          WASM_PATH=$(jq -r '.artifacts.component_wasm' component.manifest.json)
          WASM_BASENAME=$(basename "$WASM_PATH")
          cp "$WASM_PATH" "$WASM_BASENAME"
          cp component.manifest.json component.publish.manifest.json
          jq --arg wasm "$WASM_BASENAME" '.artifacts.component_wasm = $wasm' component.publish.manifest.json > component.publish.tmp && mv component.publish.tmp component.publish.manifest.json
          python -m pip install --user blake3
          WASM_BASENAME="$WASM_BASENAME" python - <<'PY'
          import json
          import os
          from pathlib import Path
          import blake3

          manifest = Path("component.publish.manifest.json")
          wasm_path = Path(os.environ["WASM_BASENAME"])

          data = json.loads(manifest.read_text())
          digest = blake3.blake3(wasm_path.read_bytes()).hexdigest()
          data["hashes"]["component_wasm"] = f"blake3:{digest}"
          manifest.write_text(json.dumps(data, indent=2))
          PY
      - name: Install ORAS
        uses: oras-project/setup-oras@v1
      - name: Login to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "${GITHUB_TOKEN}" | oras login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
      - name: Push OCI artifact to GHCR
        run: |
          VERSION=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[0].version')
          COMPONENT_NAME=$(jq -r '.name' component.manifest.json)
          WASM_PATH=$(jq -r '.artifacts.component_wasm' component.manifest.json)
          WASM_BASENAME=$(basename "$WASM_PATH")
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER}/component/${COMPONENT_NAME}"
          oras push "${IMAGE}:latest" \
            --annotation org.opencontainers.image.source="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            component.publish.manifest.json:application/vnd.greentic.component.manifest+json \
            "${WASM_BASENAME}":application/wasm
          oras push "${IMAGE}:${VERSION}" \
            --annotation org.opencontainers.image.source="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            component.publish.manifest.json:application/vnd.greentic.component.manifest+json \
            "${WASM_BASENAME}":application/wasm
