name: Nightly E2E

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  CI_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  CI_LIVE_LLM_BASE_URL: ${{ secrets.LIVE_LLM_BASE_URL }}
  CI_LIVE_LLM_MODEL: ${{ secrets.LIVE_LLM_MODEL }}
  CI_LIVE_LLM_PROVIDER: ${{ secrets.LIVE_LLM_PROVIDER }}

jobs:
  live-provider:
    runs-on: ubuntu-latest
    if: ${{ env.CI_OPENAI_API_KEY != '' }}
    env:
      LIVE_LLM_PROVIDER: ${{ secrets.LIVE_LLM_PROVIDER }}
      LIVE_LLM_BASE_URL: ${{ secrets.LIVE_LLM_BASE_URL }}
      LIVE_LLM_MODEL: ${{ secrets.LIVE_LLM_MODEL }}
      LIVE_LLM_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LIVE_LLM_PROMPT: Respond with exactly the text PONG_TEST_42 and nothing else.
      LIVE_LLM_EXPECT_CONTAINS: PONG_TEST_42
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: |
            . -> target
      - name: Restore cargo binaries cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-bins-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bins-
      - name: Set live-provider defaults
        run: |
          : "${LIVE_LLM_PROVIDER:=openai}"
          : "${LIVE_LLM_BASE_URL:=https://api.openai.com/v1}"
          : "${LIVE_LLM_MODEL:=gpt-5-mini}"
          {
            echo "LIVE_LLM_PROVIDER=${LIVE_LLM_PROVIDER}"
            echo "LIVE_LLM_BASE_URL=${LIVE_LLM_BASE_URL}"
            echo "LIVE_LLM_MODEL=${LIVE_LLM_MODEL}"
            echo "LIVE_LLM_API_KEY=${LIVE_LLM_API_KEY}"
            echo "LIVE_LLM_PROMPT=${LIVE_LLM_PROMPT}"
            echo "LIVE_LLM_EXPECT_CONTAINS=${LIVE_LLM_EXPECT_CONTAINS}"
          } >> "$GITHUB_ENV"
      - name: Run live-provider Rust test
        run: |
          mkdir -p artifacts/live-rust-test
          cargo test live_provider_roundtrip --test live_provider -- --exact --nocapture \
            2>&1 | tee artifacts/live-rust-test/cargo-test.log
      - name: Upload live test artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: nightly-live-test-artifacts
          path: |
            artifacts/live-rust-test
          if-no-files-found: ignore
